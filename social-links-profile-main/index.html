<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Social links profile</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="profile-card">
      <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall" />
      <h1>Jessica Randall</h1>
      <div class="profile-card-location">London, United Kingdom</div>
      <div class="profile-card-description">
        "Front-end developer and avid reader."
      </div>
      <div class="profile-card-links">
        <a href="https://github.com/jessica-randall" target="_blank">GitHub</a>
        <a
          href="https://www.frontendmentor.io/profile/jessica-randall"
          target="_blank"
          >Frontend Mentor</a
        >
        <a href="https://www.linkedin.com/in/jessica-randall" target="_blank"
          >LinkedIn</a
        >
        <a href="https://www.twitter.com/jessica-randall" target="_blank"
          >Twitter</a
        >
        <a href="https://www.instagram.com/jessica-randall" target="_blank"
          >Instagram</a
        >
      </div>
    </div>
  </body>
</html>
