<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Blog preview card</title>
  </head>
  <body>
    <div class="blog-preview-card">
      <div class="blog-preview-card-image-container">
        <img
          src="./assets/images/illustration-article.svg"
          alt="Blog Preview Card Image"
        />
      </div>
      <div class="blog-preview-card-content">
        <div class="blog-preview-card-tag">
          <span>Learning</span>
        </div>

        <div class="blog-preview-card-published-date">
          <div>Published 21 Dec 2023</div>
        </div>
        <div class="blog-preview-card-title">
          <h2>HTML & CSS foundations</h2>
        </div>
        <div class="blog-preview-card-description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </div>
        <div class="blog-preview-card-author">
          <img
            src="./assets/images/image-avatar.webp"
            alt="Blog Preview Card Author Image"
            class="blog-preview-card-author-image"
          />
          <div class="blog-preview-card-author-name">Greg Hooper</div>
        </div>
      </div>
    </div>
  </body>
</html>
