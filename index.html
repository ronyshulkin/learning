<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <title>Login Page</title>
  </head>
  <body>
    <div class="card">
      <h1>Login</h1>
      <form>
        <div>
          <label class="form-label" for="email">Email</label>
          <input
            class="input-field"
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />
        </div>
        <div>
          <label class="form-label" for="password">Password</label>
          <input
            class="input-field"
            type="password"
            id="password"
            name="password"
            placeholder="password"
            required
          />
        </div>
        <button type="submit">Login</button>
        <button type="Sign up" onclick="window.location.href = 'register.html'">
          Sign up
        </button>
      </form>
    </div>
  </body>
</html>
